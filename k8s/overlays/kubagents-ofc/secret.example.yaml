apiVersion: v1
kind: Secret
metadata:
  name: jasca-secret
  namespace: jasca
type: Opaque
stringData:
  # Keep both values stable after the first deployment.
  JWT_SECRET: "replace-with-a-long-random-secret"
  # Use the current value when migrating an existing JASCA PostgreSQL data directory.
  DB_PASSWORD: "replace-with-the-jsca-postgresql-password"
  ZAP_API_KEY: ""
