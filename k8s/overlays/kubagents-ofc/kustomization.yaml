apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base keeps the monolithic PostgreSQL/Redis deployment at one replica.
resources:
  - ../../monolith
  - ingress.yaml

images:
  - name: jasca-offline
    newName: harbor.kubagents-ofc.koreacb.com/jasca/jasca-offline
    newTag: v0.3.10

patches:
  - path: deployment-harbor-patch.yaml
  - path: configmap-patch.yaml
