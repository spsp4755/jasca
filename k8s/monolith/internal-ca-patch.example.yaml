spec:
  template:
    spec:
      containers:
        - name: jasca
          env:
            - name: NODE_EXTRA_CA_CERTS
              value: /app/jasca-ca/internal-ca.crt
          volumeMounts:
            - name: internal-ca
              mountPath: /app/jasca-ca
              readOnly: true
      volumes:
        - name: internal-ca
          configMap:
            name: jasca-internal-ca
