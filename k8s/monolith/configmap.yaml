apiVersion: v1
kind: ConfigMap
metadata:
  name: jasca-config
  namespace: jasca
data:
  CORS_ORIGIN: "https://jasca.koreacb.com"
  PORT: "3001"
  REDIS_URL: "redis://localhost:6379"
  TRIVY_CACHE_DIR: "/app/trivy-db"
  TRIVY_UPLOAD_MAX_BYTES: "2147483648"
  SYFT_BINARY_PATH: "syft"
  TRIVY_RPM_OS_FAMILY: "redhat"
  TRIVY_RPM_OS_VERSION: ""
  SCAN_RESULT_DIR: "/app/jasca/scan-results"
  SCAN_RESULT_RETENTION_DAYS: "0"
  ZAP_BASE_URL: "http://zap-scanner:8080"
